name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Lint markdown files
        run: |
          set -o pipefail
          COMMIT_SHA="${GITHUB_SHA:-$(git rev-parse HEAD)}"
          { echo "# commit: ${COMMIT_SHA}"; echo "# timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"; echo "---"; } > lint-results.txt
          npx --yes markdownlint-cli2@0.17.2 "**/*.md" 2>&1 | tee -a lint-results.txt

      - name: Upload lint artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-results
          path: lint-results.txt
          retention-days: 90

  terraform-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.12"

      - name: Terraform fmt
        run: terraform fmt -check -diff

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  attest:
    runs-on: ubuntu-latest
    needs: [markdown-lint, terraform-check]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all CI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ci-artifacts
          merge-multiple: true

      - name: Write Solana keypair to temp file
        if: vars.S3_COMPLIANCE_BUCKET != ''
        env:
          SOLANA_KEYPAIR: ${{ secrets.SOLANA_KEYPAIR }}
        run: |
          if [ -n "$SOLANA_KEYPAIR" ]; then
            KEYPAIR_FILE=$(mktemp)
            printf '%s' "$SOLANA_KEYPAIR" > "$KEYPAIR_FILE"
            chmod 600 "$KEYPAIR_FILE"
            echo "SOLANA_KEYPAIR_PATH=$KEYPAIR_FILE" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials (OIDC)
        if: vars.S3_COMPLIANCE_BUCKET != ''
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Attest CI artifacts on Solana
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          ARTIFACT_DIR: ci-artifacts
          OUTPUT_DIR: ci-output
          EVIDENCE_BUNDLE: ${{ vars.EVIDENCE_BUNDLE }}
          S3_COMPLIANCE_BUCKET: ${{ vars.S3_COMPLIANCE_BUCKET }}
          SOLANA_NETWORK: ${{ vars.SOLANA_NETWORK || 'devnet' }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: node scripts/attest.mjs

      - name: Upload attestation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: attestation
          path: |
            ci-output/ci-artifacts.zip
            ci-output/attestation.pdf
          retention-days: 90

      - name: Cleanup keypair
        if: always()
        run: rm -f "$SOLANA_KEYPAIR_PATH"
